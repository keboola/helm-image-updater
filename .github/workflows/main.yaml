name: Build and Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - "**"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests -sv --doctest-modules --junitxml=junit/test-results.xml

      - name: Upload pytest results
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results
          path: junit/test-results.xml
        if: ${{ always() }}

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          comment_mode: off
          files: junit/test-results.xml

  test-action-yaml:
    name: Test action.yaml release download
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: robinraju/release-downloader@v1.12
        with:
          repository: "keboola/helm-image-updater"
          latest: true
          fileName: "*.tar.gz"

      - name: Verify download and install
        run: |
          echo "Downloaded files:"
          ls -la helm_image_updater-*.tar.gz
          pip install helm_image_updater-*.tar.gz
          which helm-image-updater
          echo "action.yaml release download verified successfully"

  build-and-publish-package:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./dist/helm_image_updater-*.tar.gz"
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
